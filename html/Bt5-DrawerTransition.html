<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 너비 조절형 푸시 메뉴</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --drawer-width: 300px;
            --transition-speed: 0.3s;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        /* ========================================================================
        [레이아웃 설정]
        단순히 밀어내는 것이 아니라 너비 자체를 계산하여 변경합니다.
        ======================================================================== 
        */
        #main-wrapper {
            flex: 1;
            width: 100%;
            transition: margin-left var(--transition-speed) ease-in-out, 
                        width var(--transition-speed) ease-in-out;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 메뉴가 열렸을 때: 왼쪽 여백을 메뉴 너비만큼 주고, 전체 너비는 100% - 메뉴너비가 됨 */
        .menu-open #main-wrapper {
            margin-left: var(--drawer-width);
            width: calc(100% - var(--drawer-width));
            /* flex-grow를 해제하여 width 계산값이 정확히 적용되도록 함 */
            flex: none; 
        }

        /* 드로어 메뉴 스타일 */
        .offcanvas-start {
            width: var(--drawer-width) !important;
            /* 배경 상호작용을 위해 투명도나 그림자를 조절할 수 있음 */
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .menu-link { 
            text-decoration: none; 
            color: #333; 
            display: block; 
            padding: 12px 15px; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        .menu-link:hover { 
            background-color: #e9ecef;
            color: #0d6efd; 
        }
        
        /* 반응형 대응: 화면이 아주 작을 때는 너비 조절보다는 기본 덮기 형식이 나을 수 있음 */
        @media (max-width: 576px) {
            .menu-open #main-wrapper {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body id="body-container">

    <!-- [1. 메인 콘텐츠 영역] 메뉴가 열리면 width가 줄어들며 내부 요소들이 재배치됩니다. -->
    <div id="main-wrapper">
        <div class="container-fluid">
            <header class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="h4">Responsive Layout</h2>
                
                <!-- [메뉴 열기 버튼] -->
                <button class="btn btn-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#drawerMenu" aria-controls="drawerMenu">
                    ☰ 메뉴 열기
                </button>
            </header>

            <main class="py-5">
                <div class="card shadow-sm p-4 p-md-5">
                    <h1 class="display-6">Width Adjust Menu</h1>
                    <p class="lead text-muted">메뉴가 열리면 이 카드의 너비가 자동으로 줄어듭니다. 콘텐츠가 화면 밖으로 밀려나지 않습니다.</p>
                    
                    <div class="row mt-4">
                        <div class="col-md-6 mb-3">
                            <div class="p-3 border rounded bg-white">가변 그리드 요소 1</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="p-3 border rounded bg-white">가변 그리드 요소 2</div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="button" class="btn btn-primary" onclick="alert('정상 동작합니다!')">인터랙션 테스트</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 
    ========================================================================
    [2. 드로어 메뉴 컨테이너]
    ======================================================================== 
    -->
    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="drawerMenu" aria-labelledby="drawerMenuLabel">
        
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="drawerMenuLabel">탐색 메뉴</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body">
            <nav class="nav flex-column">
                <a href="#" class="menu-link mb-2">🏠 대시보드</a>
                <a href="#" class="menu-link mb-2">📈 통계 보기</a>
                <a href="#" class="menu-link mb-2">✉️ 메시지</a>
                <a href="#" class="menu-link mb-2">⚙️ 설정</a>
            </nav>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const drawerMenu = document.getElementById('drawerMenu');
        const bodyContainer = document.getElementById('body-container');

        // 메뉴 이벤트 리스너
        drawerMenu.addEventListener('show.bs.offcanvas', () => {
            bodyContainer.classList.add('menu-open');
        });

        drawerMenu.addEventListener('hide.bs.offcanvas', () => {
            bodyContainer.classList.remove('menu-open');
        });
    </script>
</body>
</html>
