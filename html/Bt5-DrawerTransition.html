<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상호작용 가능한 푸시 드로어 메뉴</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            /* Bootstrap의 기본 오프캔버스 너비는 보통 400px입니다. */
            --drawer-width: 300px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* 콘텐츠가 밀려날 때 가로 스크롤 방지 */
        }

        /* ========================================================================
        [레이아웃 설정]
        메인 콘텐츠가 부드럽게 밀려나도록 transition을 설정합니다.
        ======================================================================== 
        */
        #main-wrapper {
            transition: transform 0.3s ease-in-out;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            background-color: #f8f9fa;
        }

        /* 메뉴가 열렸을 때 콘텐츠를 오른쪽으로 이동 */
        .menu-open #main-wrapper {
            transform: translateX(var(--drawer-width));
        }

        /* 드로어 메뉴 너비 강제 지정 (밀어내는 거리와 일치시킴) */
        .offcanvas-start {
            width: var(--drawer-width) !important;
        }

        .menu-link { 
            text-decoration: none; 
            color: #333; 
            display: block; 
            padding: 12px 15px; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        .menu-link:hover { 
            background-color: #e9ecef;
            color: #0d6efd; 
        }
    </style>
</head>
<body id="body-container">

    <!-- [1. 메인 콘텐츠 영역] 메뉴가 열릴 때 이 영역 전체가 이동합니다. -->
    <div id="main-wrapper">
        <div class="container-fluid">
            <header class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="h4">My Project</h2>
                
                <!-- [메뉴 열기 버튼] -->
                <button class="btn btn-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#drawerMenu" aria-controls="drawerMenu">
                    ☰ 메뉴 열기
                </button>
            </header>

            <main class="py-5 text-center">
                <div class="card shadow-sm p-5">
                    <h1 class="display-5">Push Menu Demo</h1>
                    <p class="lead text-muted">메뉴가 열려도 이 버튼들을 클릭하거나 텍스트를 선택할 수 있습니다.</p>
                    
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">
                        <button type="button" class="btn btn-primary btn-lg px-4 gap-3" onclick="alert('메인 버튼 클릭!')">기능 실행</button>
                        <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="console.log('로그 기록')">콘솔 로그</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 
    ========================================================================
    [2. 드로어 메뉴 컨테이너 (Content)]
    - offcanvas-start: 왼쪽에서 열림
    - data-bs-scroll="true": 배경 스크롤 허용
    - data-bs-backdrop="false": 배경 딤 처리 제거 (상호작용 가능)
    ======================================================================== 
    -->
    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="drawerMenu" aria-labelledby="drawerMenuLabel">
        
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="drawerMenuLabel">탐색 메뉴</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body">
            <nav class="nav flex-column">
                <a href="#" class="menu-link mb-2">🏠 홈으로 이동</a>
                <a href="#" class="menu-link mb-2">📊 대시보드 확인</a>
                <a href="#" class="menu-link mb-2">⚙️ 시스템 설정</a>
                <a href="#" class="menu-link mb-2">❓ 자주 묻는 질문</a>
            </nav>
            
            <div class="position-absolute bottom-0 start-0 p-3 w-100 border-top bg-light">
                <p class="mb-0 small text-center text-muted">Version 1.0.2</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /**
         * [메뉴 상태 제어 스크립트]
         * Bootstrap의 오프캔버스 이벤트를 감지하여 body에 클래스를 추가/제거합니다.
         */
        const drawerMenu = document.getElementById('drawerMenu');
        const bodyContainer = document.getElementById('body-container');

        // 메뉴가 표시되기 시작할 때 (애니메이션 시작)
        drawerMenu.addEventListener('show.bs.offcanvas', () => {
            bodyContainer.classList.add('menu-open');
        });

        // 메뉴가 사라지기 시작할 때 (애니메이션 시작)
        drawerMenu.addEventListener('hide.bs.offcanvas', () => {
            bodyContainer.classList.remove('menu-open');
        });
    </script>
</body>
</html>
