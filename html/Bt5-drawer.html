<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단순한 드로어 메뉴 예제</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 기본 스타일 다듬기 (선택 사항) */
        body { padding-top: 20px; }
        .menu-link { text-decoration: none; color: #333; display: block; padding: 10px 0; }
        .menu-link:hover { color: #0d6efd; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
        ========================================================================
        [1. 메뉴 여닫기 제어 부분 (Trigger)]
        이 부분은 메뉴를 열기 위한 버튼(또는 아이콘)입니다.
        타 플랫폼 이식 시: 상태(State)를 변경하여 메뉴 표시 여부를 결정하는 
        이벤트(예: onClick)를 연결하는 영역이 됩니다.
        Bootstrap 5에서는 'data-bs-toggle'과 'data-bs-target' 속성으로 동작합니다.
        ======================================================================== 
        -->
        <header class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
            <h2>나의 웹사이트</h2>
            
            <!-- 드로어 메뉴 열기 버튼 -->
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#drawerMenu" aria-controls="drawerMenu">
                ☰ 메뉴 열기
            </button>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main>
            <h4>안녕하세요!</h4>
            <p>이 웹페이지는 Bootstrap 5를 활용하여 만든 아주 단순한 드로어(사이드바) 메뉴 예제입니다.</p>
            <p>오른쪽 위의 '메뉴 열기' 버튼을 클릭해 보세요.</p>
        </main>
    </div>


    <!-- 
    ========================================================================
    [2. 드로어 메뉴 전체 컨테이너 및 닫기 제어 부분]
    화면 바깥에 숨겨져 있다가 호출 시 나타나는 영역입니다.
    타 플랫폼 이식 시: isMenuOpen 등의 상태 값에 따라 렌더링되거나, 
    CSS 클래스(transform: translateX)로 애니메이션을 주는 래퍼(Wrapper) 컴포넌트가 됩니다.
    ======================================================================== 
    -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="drawerMenu" aria-labelledby="drawerMenuLabel">
        
        <!-- 드로어 헤더 (닫기 버튼 포함) -->
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="drawerMenuLabel">전체 메뉴</h5>
            
            <!-- 드로어 메뉴 닫기 버튼 -->
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>

        <!-- 
        ========================================================================
        [3. 순수 메뉴 콘텐츠 영역 (Content)]
        이 부분은 실제 메뉴 항목들이 들어가는 곳입니다.
        타 플랫폼 이식 시: 이 영역의 HTML/컴포넌트 구조는 그대로 가져가서 
        스타일만 맞춰 재사용하면 됩니다. 여닫는 로직과는 완전히 분리되어 있습니다.
        ======================================================================== 
        -->
        <div class="offcanvas-body">
            <nav>
                <ul class="list-unstyled">
                    <li><a href="#" class="menu-link fs-5">🏠 홈</a></li>
                    <li><a href="#" class="menu-link fs-5">👤 내 프로필</a></li>
                    <li><a href="#" class="menu-link fs-5">🛒 장바구니</a></li>
                    <li><a href="#" class="menu-link fs-5">⚙️ 환경설정</a></li>
                </ul>
            </nav>
            
            <div class="mt-5">
                <p class="text-muted small">© 2026 MyCompany. All rights reserved.</p>
            </div>
        </div>
        <!-- =================== 메뉴 콘텐츠 영역 끝 =================== -->

    </div>

    <!-- Bootstrap 5 JS Bundle (Popper 포함, 드로어 동작에 필수) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
